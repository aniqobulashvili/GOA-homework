<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>Travel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f2f2f2;
      margin: 0;
      padding: 0;
    }
    header, footer {
      background-color: #00ffd5;
      color: white;
      padding: 20px;
    }
    main {
      padding: 20px;
    }
    section {
      margin: 20px 0;
    }
    p {
      color: rgb(195, 130, 238);
      font-size: 18px;
    }
    img {
      width: 200px;
      height: 150px;
      border: 3px solid #ff6600;
      border-radius: 10px;
      margin: 10px;
    }
  </style>
</head>
<body>

<header>
  <h1>Pics i've taken</h1>
</header>

<main>
  <section>
    <h2></h2>
    <div>
      <p>This was my first travelling</p>
      <img src="https://i.pinimg.com/1200x/9b/5c/d9/9b5cd9b6019ef4555a699637d7a4eca2.jpg">
      <img src="https://i.pinimg.com/736x/e5/87/94/e58794a2700413d7a3eb7ef40ac2c487.jpg" >
    </div>
  </section>

  <section>
    <h2>Best memories</h2>
    <div>
      <p>Pictures from different countries</p>
      <img src="https://i.pinimg.com/736x/33/96/1a/33961a0e7e650674e79552d904fe34fd.jpg">
      <img src="https://i.pinimg.com/1200x/83/36/5d/83365d0d810d37928724353fd9047cc2.jpg" >
      <img src="https://i.pinimg.com/736x/96/e3/06/96e3064d756740534850025e6b14966f.jpg" >
    </div>
  </section>
</main>

</body>
</html>
