<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
        <label for="name">Name:</label> <br>
        <input type="name" placeholder="Enter your Name" id="name"><br><br>

        <label for="surname">Surname:</label> <br>
        <input type="surname" placeholder="Enter your surname" id="surname"><br><br>

        <label for="email">Email:</label> <br>
        <input type="email" placeholder="Enter your e-mail" id="email"><br><br>

        <label for="pass">Password:</label><br>
        <input type="pass" placeholder="Enter your password" id="pass"><br><br>

        <label for="password">Confirm your password</label><br>
        <input type="password" placeholder="Confirm your password" id="password"><br><br>

        <label for="gender">Choose your gender</label><br>
        <select name="Gender" id="gender">
            <option value="Female">Female</option>
            <option value="Male">Male</option>
            <option value="Other">Other</option>
            <option value="Prefer not to say">Prefer not to say</option>
        </select>

        <br><br>
        <button type="submit">Submit</button>
    </form>
</body>

</html>
