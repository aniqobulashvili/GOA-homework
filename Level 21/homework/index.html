    <!-- Inline CSS სტილი იწერება უშუალოდ HTML ელემენტის 'style' ატრიბუტში. 
გამოიყენება კონკრეტული ელემენტის სწრაფი გასტილვისთვის, თუმცა 
დიდი პროექტებისთვის მოუხერხებელია.
მაგალითი: <h1 style="color: red;">Hello</h1>
    Internal CSS სტილები იწერება HTML დოკუმენტის <head> სექციაში, <style> ტეგებს შორის.
მოსახერხებელია, როცა სტილი მხოლოდ ერთ კონკრეტულ გვერდს ეხება.
    External CSS სტილები იწერება ცალკე .css ფაილში, რომელიც HTML-ს უკავშირდება <link> ტეგით.
ეს არის საუკეთესო პრაქტიკა, რადგან ერთი ფაილით შეგიძლიათ მართოთ 
მთელი საიტის დიზაინი. -->
